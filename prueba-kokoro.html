<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17231f">
  <title>Prueba Kokoro · ATENEA</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, -apple-system, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #101815; color: #f4f1e8; }
    main { width: min(100%, 520px); padding: 30px; border: 1px solid #385047; border-radius: 24px; background: #17231f; box-shadow: 0 18px 60px #0007; }
    .mark { display: grid; place-items: center; width: 70px; height: 70px; border-radius: 18px; background: #d1ad55; color: #17231f; font: 700 42px Georgia, serif; }
    p { color: #b8c3bd; line-height: 1.55; }
    .eyebrow { margin: 24px 0 6px; color: #d1ad55; font-size: 12px; font-weight: 700; letter-spacing: .15em; }
    h1 { margin: 0 0 8px; font-size: 30px; }
    audio { width: 100%; margin: 22px 0 12px; }
    small { display: block; color: #91a099; }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">A</div>
    <p class="eyebrow">PRUEBA DE VOZ KOKORO · SANTA</p>
    <h1>Nota metodológica</h1>
    <p>Primera prueba del nuevo audio generado localmente para ATENEA.</p>
    <audio controls preload="metadata" src="00-nota-metodologica.wav">
      Tu navegador no puede reproducir este archivo de audio.
    </audio>
    <small>Si aparecen los controles pero no comienza el audio, comprueba que ambos archivos estén en la misma carpeta del repositorio.</small>
  </main>
</body>
</html>
